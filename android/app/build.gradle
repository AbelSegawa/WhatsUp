plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "com.google.gms.google-services"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.tauseef.whatsappclone"
    compileSdk 36  // match Platform 36 you installed

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.tauseef.whatsappclone"
        minSdk 24
        targetSdk 36  // match compileSdk
        multiDexEnabled true
        versionCode flutterVersionCode.toInteger()  // <-- add this
        versionName flutterVersionName              // <-- add this
    }
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:34.14.1')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
    implementation 'com.google.firebase:firebase-storage'
}

flutter {
    source "../.."
}
