buildscript {
    ext.kotlin_version = '2.0.21'
}

plugins {
    id "com.android.application" version "8.3.0" apply false
    id "org.jetbrains.kotlin.android" version "2.0.21" apply false
    id "dev.flutter.flutter-gradle-plugin" apply false
    id 'com.google.gms.google-services' version '4.4.4' apply false
}

rootProject.buildDir = '../build'

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    
    // Apply Java 17 + namespace to all Android modules
    afterEvaluate { project ->
        if (project.plugins.hasPlugin('com.android.library') || project.plugins.hasPlugin('com.android.application')) {
            android {
                // Permanent fix for plugins like flutter_keyboard_visibility missing namespace
                if (namespace == null) {
                    namespace project.group.toString()
                }
                
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_17
                    targetCompatibility JavaVersion.VERSION_17
                }
            }
        }
        
        // Apply Kotlin 17 to all modules
        tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
            kotlinOptions {
                jvmTarget = "17"
                languageVersion = "1.9"  // Keep Kotlin 1.9 syntax, use 2.0 compiler
            }
        }
        
        tasks.withType(JavaCompile).configureEach {
            sourceCompatibility = "17"
            targetCompatibility = "17"
        }
    }
}

subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
