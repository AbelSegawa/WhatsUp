buildscript {
    ext.kotlin_version = '1.9.24'  // was 1.8.22
}

plugins {
    id "com.android.application" version "8.3.0" apply false  // was 7.4.2
    id "org.jetbrains.kotlin.android" version "1.9.24" apply false  // was 1.8.22
    id "dev.flutter.flutter-gradle-plugin" apply false
    id 'com.google.gms.google-services' version '4.4.4' apply false
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    
    // Apply Java 17 to all plugins/subprojects
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            jvmTarget = "17"
        }
    }
    tasks.withType(JavaCompile).configureEach {
        sourceCompatibility = "17"
        targetCompatibility = "17"
    }
}

subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
