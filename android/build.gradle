buildscript {
    ext.kotlin_version = '1.9.22' // Upgraded to support modern Gradle
    dependencies {
        // START: FlutterFire Configuration
        classpath 'com.google.gms:google-services:4.3.15'
        // END: FlutterFire Configuration
    }
}

plugins {
    id "com.android.application" version "8.1.0" apply false // Upgraded to match Flutter 3.44+
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false // Upgraded
    id "dev.flutter.flutter-gradle-plugin" apply false
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
